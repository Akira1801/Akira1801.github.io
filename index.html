<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Babi's Lounge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/navbar.css">
    
    <style>
        /* Prevent side scrolling */
        body {
            overflow-x: hidden;
        }
    </style>

    <script>
        function updateDateTime() {
            const dateElement = document.getElementById("date-time");
            const now = new Date();
            dateElement.innerHTML = now.toLocaleDateString() + " - " + now.toLocaleTimeString();
        }

        function fetchWeather() {
            fetch("https://api.weatherapi.com/v1/current.json?key=70459c2ff1614db6bce75414250503&q=Metro Manila")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("weather").innerHTML =
                        `${data.current.temp_c}°C - ${data.current.condition.text}`;
                })
                .catch(error => console.error("Error fetching weather:", error));
        }

        document.addEventListener("DOMContentLoaded", function () {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            fetchWeather();
        });
    </script>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <img src="/assets/yarn.svg" alt="yarn" width="30" height="30" class="me-2">
        <a class="navbar-brand" href="#">Babi's Lounge</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
          <ul class="nav">
              <li class="nav-item">
                <a class="nav-link active" href="/index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/Crochet.html">Crochet Library</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/Tracker.html">Tracker</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" href="/pages/Recipes.html">Recipe List</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" href="/pages/Movies.html">Movie Playlist</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" href="/pages/Music.html">Music Playlist</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" href="/pages/Webtoon.html">Webtoon Playlist</a>
              </li>
            </ul>
        </div>
      </div>
    </nav>

    <div class="container text-center mt-4">
        <h2 class="display-4 fw-bold">Welcome Babi!</h2>
        <h4 class="text-secondary mt-2">A space just for your needs!</h4>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center g-3">
            <!-- Date and Time Card -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="row g-0 align-items-center">
                        <div class="col-4 text-center">
                            <img src="/assets/clock.svg" class="img-fluid" alt="Clock" style="height: 100px;">
                        </div>
                        <div class="col-8">
                            <div class="card-body">
                                <h5 class="card-title">Today's Date and Time</h5>
                                <p class="card-text" id="date-time">Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Weather Card -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="row g-0 align-items-center">
                        <div class="col-4 text-center">
                            <img src="/assets/weather.svg" class="img-fluid" alt="Weather" style="height: 100px;">
                        </div>
                        <div class="col-8">
                            <div class="card-body">
                                <h5 class="card-title">Current Weather in Metro Manila</h5>
                                <p class="card-text" id="weather">Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

  </body>
</html>
